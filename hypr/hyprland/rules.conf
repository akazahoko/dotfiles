windowrule = opacity $alpha, match:class org.kde.kwrite
windowrule = opacity $alpha, match:class org.kde.konsole

### Floating ###
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:class btop
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class firewall-config
windowrule = float on, match:class waypaper
windowrule = float on, match:class nwg-look
windowrule = float on, match:class org.fcitx.fcitx5-config-qt
windowrule = float on, match:class firefox, match:title 子母畫面
windowrule = float on, match:class qt6ct
windowrule = float on, match:class qt5ct
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class system-config-printer
windowrule = float on, match:class mpv
windowrule = float on, match:class fastfetch

# Special Workspace
windowrule = dim_around on, match:workspace special:special

### Default Size ### (4:3)
windowrule = size 1020 765, match:class org.pulseaudio.pavucontrol

### Pinned ###
windowrule = border_color $red $pink, match:pin on 
windowrule = pin on, match:class firefox, match:title 子母畫面

##### LAYER RULES #####
# Reference: https://wiki.hypr.land/Configuring/Window-Rules/#layer-rules
layerrule {
    name = Launcher

    blur        = on
    dim_around  = on

    match:namespace = launcher
}

layerrule = blur on,        match:namespace logout_dialog

##### WORKSPACE RULES #####
# Reference: https://wiki.hyprland.org/Configuring/Workspace-Rules/

#################
##### MISCS #####
#################
# Fix Chromium-based right-click-menu
windowrule = no_blur on, match:class ^()$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = MaximizeIgnore
    
    suppress_event = maximize
    
    match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
    name = XWaylandFix
    
    no_focus = on

    match:class         = ^$
    match:title         = ^$
    match:xwayland      = 1
    match:float         = 1
    match:fullscreen    = 0
    match:pin           = 0
}