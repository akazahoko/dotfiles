windowrule = opacity $alpha, match:class org.gnome.Nautilus
windowrule = opacity $alpha, match:class org.qbittorrent.qBittorrent
windowrule = opacity $alpha, match:class btop
windowrule = opacity $alpha, match:class audacious
windowrule = opacity $alpha, match:class nm-connection-editor
windowrule = opacity $alpha, match:class org.pulseaudio.pavucontrol
windowrule = opacity $alpha, match:class discord
windowrule = opacity $alpha, match:class org.coolercontrol.CoolerControl
windowrule = opacity $alpha, match:class system-config-printer
windowrule = opacity $alpha, match:class org.prismlauncher.PrismLauncher
windowrule = opacity $alpha, match:class system-config-printer
windowrule = opacity $alpha, match:class blueman-manager
windowrule = opacity $alpha, match:class firewall-config
windowrule = opacity $alpha, match:class winegui
windowrule = opacity $alpha, match:class calibre-gui
windowrule = opacity $alpha, match:class obsidian
windowrule = opacity $alpha, match:class org.mozilla.Thunderbird
