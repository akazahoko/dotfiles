# Reference: https://wiki.hypr.land/Configuring/Keywords/
# Reference: https://wiki.hypr.land/Configuring/Binds/
# Reference: https://wiki.hypr.land/Configuring/Dispatchers/

# Mod Keys
$MouseBtnL          = mouse:272
$MouseBtnR          = mouse:273
$capsLock           = code:66
$numLock            = code:77

###################
##### WINDOWS #####
###################

$WindowChangeFocus  = Super
$WindowMove         = Super
$WindowMoveMouse    = Super, $MouseBtnL 
$WindowMoveFocus    = Ctrl Super
$WindowResize       = Alt Super
$WindowResizeMouse  = Super, $MouseBtnR
$WindowPin          = Super, t
$WindowFloating     = Super, f
$WindowFullscreen   = Super, Return

# Change Windows Focus
bind = $WindowChangeFocus, up,      movefocus, u
bind = $WindowChangeFocus, down,    movefocus, d
bind = $WindowChangeFocus, left,    movefocus, l
bind = $WindowChangeFocus, right,   movefocus, r

# Move Window
bindm = $WindowMoveMouse, movewindow

# Move Focus to other Window
bind = $WindowMoveFocus, up,        movefocus, u
bind = $WindowMoveFocus, down,      movefocus, d
bind = $WindowMoveFocus, left,      movefocus, l
bind = $WindowMoveFocus, right,     movefocus, r

# Resize Window
$RESIZE = 30
binde = $WindowResize, up,          resizeactive, 0         -$RESIZE
binde = $WindowResize, down,        resizeactive, 0         $RESIZE
binde = $WindowResize, left,        resizeactive, -$RESIZE  0
binde = $WindowResize, right,       resizeactive, $RESIZE   0
bindm = $WindowResizeMouse,         resizewindow

# Toggle Float / Pin
bind = $WindowPin,                  pin
bind = $WindowFloating,             togglefloating
bind = Ctrl $WindowFloating,        togglefloating
bind = Ctrl $WindowFloating,        pin

# Toggle Fullscreen
bind = $WindowFullscreen,           fullscreen

######################
##### WORKSPACES #####
######################

$WorkspaceSwitch        = Super
$WorkspaceScrollUp      = Super, mouse_up
$WorkspaceScrollDown    = Super, mouse_down
$WorkspaceMove          = Shift Super
$WorkspaceMoveSilent    = Ctrl Shift Super

# Switch Workspace
bind = $WorkspaceSwitch, 1,         workspace, 1
bind = $WorkspaceSwitch, 2,         workspace, 2
bind = $WorkspaceSwitch, 3,         workspace, 3
bind = $WorkspaceSwitch, 4,         workspace, 4
bind = $WorkspaceSwitch, 5,         workspace, 5
bind = $WorkspaceSwitch, 6,         workspace, 6
bind = $WorkspaceSwitch, 7,         workspace, 7
bind = $WorkspaceSwitch, 8,         workspace, 8
bind = $WorkspaceSwitch, 9,         workspace, 9
bind = $WorkspaceSwitch, 0,         workspace, 10
bind = $WorkspaceSwitch, s,         togglespecialworkspace, special
bind = $WorkspaceSwitch, grave,     workspace, previous

# Scroll through Workspaces
bind = $WorkspaceScrollUp,          workspace, e+1
bind = $WorkspaceScrollDown,        workspace, e-1

# Move Focused Window to Workspace
bind = $WorkspaceMove, 1,           movetoworkspace, 1 
bind = $WorkspaceMove, 2,           movetoworkspace, 2 
bind = $WorkspaceMove, 3,           movetoworkspace, 3 
bind = $WorkspaceMove, 4,           movetoworkspace, 4 
bind = $WorkspaceMove, 5,           movetoworkspace, 5 
bind = $WorkspaceMove, 6,           movetoworkspace, 6 
bind = $WorkspaceMove, 7,           movetoworkspace, 7 
bind = $WorkspaceMove, 8,           movetoworkspace, 8 
bind = $WorkspaceMove, 9,           movetoworkspace, 9 
bind = $WorkspaceMove, 0,           movetoworkspace, 10
bind = $WorkspaceMove, s,           movetoworkspace, special
bind = $WorkspaceMove, grave,       movetoworkspace, previous

# Move Focused Window to Workspace (Silent)
bind = $WorkspaceMoveSilent, 1,     movetoworkspacesilent, 1 
bind = $WorkspaceMoveSilent, 2,     movetoworkspacesilent, 2 
bind = $WorkspaceMoveSilent, 3,     movetoworkspacesilent, 3 
bind = $WorkspaceMoveSilent, 4,     movetoworkspacesilent, 4 
bind = $WorkspaceMoveSilent, 5,     movetoworkspacesilent, 5 
bind = $WorkspaceMoveSilent, 6,     movetoworkspacesilent, 6 
bind = $WorkspaceMoveSilent, 7,     movetoworkspacesilent, 7 
bind = $WorkspaceMoveSilent, 8,     movetoworkspacesilent, 8 
bind = $WorkspaceMoveSilent, 9,     movetoworkspacesilent, 9 
bind = $WorkspaceMoveSilent, 0,     movetoworkspacesilent, 10
bind = $WorkspaceMoveSilent, s,     movetoworkspace, special
bind = $WorkspaceMoveSilent, grave, movetoworkspace, previous

###################
##### LAYOUTS #####
###################

# Split 
bind = Shift Super, r,              togglesplit

# Balance
bind = Super, b,                    splitratio, exact 1 1

##############################
##### MULTIMEDIA CONTROL #####
##############################

# Volume Control (Sink)
bindel = ,XF86AudioRaiseVolume,         exec, $SCRIPT_DIR/volume.sh sink up
bindel = ,XF86AudioLowerVolume,         exec, $SCRIPT_DIR/volume.sh sink down
bindel = ,XF86AudioMute,                exec, $SCRIPT_DIR/volume.sh sink mute

# Volume Control (Source)
bindel = CTRL, XF86AudioRaiseVolume,    exec, $SCRIPT_DIR/volume.sh source up
bindel = CTRL, XF86AudioLowerVolume,    exec, $SCRIPT_DIR/volume.sh source down
bindel = CTRL, XF86AudioMute,           exec, $SCRIPT_DIR/volume.sh source mute

# Monitor Brightness Control (DDC/CI)
bindel = ,XF86MonBrightnessUp,          exec, $SCRIPT_DIR/brightness.sh up
bindel = ,XF86MonBrightnessDown,        exec, $SCRIPT_DIR/brightness.sh down

# Playback Control (MPRIS)
bindl = ,XF86AudioNext,                 exec, $SCRIPT_DIR/mpris.sh next
bindl = ,XF86AudioPause,                exec, $SCRIPT_DIR/mpris.sh play-pause
bindl = ,XF86AudioPlay,                 exec, $SCRIPT_DIR/mpris.sh play-pause
bindl = ,XF86AudioPrev,                 exec, $SCRIPT_DIR/mpris.sh previous

# Locks
bind = ,$capsLock,                      exec, $SCRIPT_DIR/lock.sh capslockt
bind = ,$numLock,                       exec, $SCRIPT_DIR/lock.sh numlock

# Reload
bind = Super, F5,                       exec, $SCRIPT_DIR/reload.sh waybar
bind = Super, F5,                       exec, $SCRIPT_DIR/reload.sh swaync

########################
##### APPLICATIONS #####
########################
$Launch         = Ctrl Alt Shift Super  # keyd maps caps lock to hyper (Overloading)
$LaunchMenu     = Super
$Toggle         = Super
$Power          = Ctrl Alt

bind = Super, q,            killactive
bind = Shift Super, q,      forcekillactive

# dmenu
$dmenu          = rofi -dmenu

bind = $LaunchMenu, r,      exec, $run
bind = $LaunchMenu, v,      exec, $clipboard
bind = $LaunchMenu, n,      exec, $notification

# Applications
$terminal       = kitty
$nautilus       = nautilus
$dolphin        = dolphin
$firefox        = firefox
$run            = rofi -show drun
$clipboard      = cliphist list | $dmenu --hide-prompt | cliphist decode | wl-copy
$screenshot     = hyprshot -m region -o ~/圖片/螢幕截圖
$notification   = swaync-client -t
$colorpicker    = hyprpicker -a
$vscode         = code
$btop           = $terminal --class=btop -e btop

bind = $Launch, f,          exec, $firefox
bind = $Launch, d,          exec, $dolphin
bind = $Launch, t,          exec, $terminal
bind = $Launch, e,          exec, $nautilus
bind = $Launch, v,          exec, $clipboard
bind = $Launch, s,          exec, $screenshot
bind = $Launch, p,          exec, $colorpicker
bind = $Launch, c,          exec, $vscode
bind = $Launch, b,          exec, $btop

# Toggle Services
$waybar         = killall -SIGUSR1 waybar
$idleinhibitor  = $SCRIPT_DIR/inhibitor.sh

bind = $Toggle, w,          exec, $waybar
bind = $Toggle, l,          exec, $idleinhibitor

# Power Options
$wlogout        = pkill wlogout || wlogout -b 1
$suspend        = systemctl suspend

bind = $Power, Delete,      exec, $wlogout
bind = $Power, s,           exec, $suspend