# Reference: https://man.archlinux.org/man/fuzzel.ini.5.en

################
##### MAIN #####
################
namespace                   = fuzzel
# output                      = <not set>
font                        = FiraCode Nerd Font:size=16
dpi-aware                   = auto
use-bold                    = yes
placeholder                 = ""
prompt                      = ""
icon-theme                  = default  
icons-enabled               = no
hide-before-typing          = no
fields                      = filename,name,generic
password-character          = *
match-mode                  = fzf
sort-result                 = yes
match-counter               = no
filter-desktop              = no
show-actions                = no
terminal                    = kitty -e  # Note: you cannot actually use environment variables here
list-executables-in-path    = no
# launch-prefix               = <not set>
anchor                      = center
x-margin                    = 0
y-margin                    = 0
lines                       = 15
hide-prompt                 = no
minimal-lines               = yes
width                       = 30
tabs                        = 4
horizontal-pad              = 30
vertical-pad                = 8
inner-pad                   = 20
image-size-ratio            = 0.1
line-height                 = 24
letter-spacing              = 0
layer                       = overlay
keyboard-focus              = exclusive
exit-on-keyboard-focus-loss = yes
# render-workers              = <number of logical CPUs>
# match-workers               = <number of logical CPUs>
delayed-filter-ms           = 300
delayed-filter-limit        = 20000
scaling-filter              = box
# cache                       = <not set>
auto-select                 = no
enable-mouse                = yes

##################
##### COLORS #####
##################
include                     = ~/.config/fuzzel/themes/catppuccin_mocha.ini 

##################
##### BORDER #####
##################
[border]
width                       = 0
radius                      = 0
selection-radius            = 0

##################
##### DMENU ######
##################
[dmenu]
mode                        = text  # text|index
exit-immediately-if-empty   = no

########################
##### KEY-BINDINGS #####
########################
[key-bindings]
cancel                      = Escape Control+c
execute                     = Return Control+space
execute-or-next             = Tab
execute-input               = Shift+Return
cursor-left                 = Left 
cursor-left-word            = Control+Left
cursor-right                = Right
cursor-right-word           = Control+Right
cursor-home                 = Home
cursor-end                  = End
delete-line-backward        = Control+u
delete-line-forward         = Control+k
delete-prev                 = BackSpace
delete-prev-word            = Control+BackSpace Control+w
delete-next                 = Delete
delete-next-word            = Control+Delete
insert-selected             = Control+Tab
expunge                     = Shift+Delete
clipboard-paste             = Control+v
primary-paste               = Shift+Insert
prev                        = Up
prev-with-wrap              = Shift+Tab
prev-page                   = Page_Up Control+Up
next                        = Down Control+n
next-with-wrap              = none
next-page                   = Page_Down KP_Page_Down Control+Down
first                       = Control+Home
last                        = Control+End

# Customs Keybinds
# custom-N: *dmenu mode only*. Like execute, but with a non-zero
# exit-code; custom-1 exits with code 10, custom-2 with 11, custom-3
# with 12, and so on.

