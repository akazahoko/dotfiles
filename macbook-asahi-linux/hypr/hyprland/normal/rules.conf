windowrule = opacity $opacity-alpha, match:class org.fcitx.fcitx5-config-qt
windowrule = opacity $opacity-alpha, match:class org.kde.partitionmanager
windowrule = opacity $opacity-alpha, match:class font-manager
windowrule = opacity $opacity-alpha, match:class com.github.FontManager.FontViewer
windowrule = opacity $opacity-alpha, match:class kdesystemsettings
windowrule = opacity $opacity-alpha, match:class org.kde.kdeconnect.app
windowrule = opacity $opacity-alpha, match:class protonvpn-app
windowrule = opacity $opacity-alpha, match:class org.kde.kate
windowrule = opacity $opacity-alpha, match:class org.kde.kwrite
windowrule = opacity $opacity-alpha, match:class org.kde.konsole
