windowrule = opacity $opacity-alpha, match:class webapp-manager.py
windowrule = opacity $opacity-alpha, match:class org.kde.ark

### Floating ###
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:class btop
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class firewall-config
windowrule = float on, match:class waypaper
windowrule = float on, match:class nwg-look
windowrule = float on, match:class org.fcitx.fcitx5-config-qt
windowrule = float on, match:class firefox, match:title 子母畫面
windowrule = float on, match:class qt6ct
windowrule = float on, match:class qt5ct
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class system-config-printer
windowrule = float on, match:class mpv
windowrule = float on, match:class fastfetch
windowrule = float on, match:class webapp-manager.py

# Special Workspace
windowrule = dim_around on, match:workspace special:special

### Default Size ### (4:3)
windowrule = size 1020 765, match:class org.pulseaudio.pavucontrol

### Pinned ###
windowrule {
    name = pinned

    border_color    = $pinned-border-color
    border_size     = 2

    match:pin       = on
}

# windowrule = float on, pin on, match:class firefox, match:title 子母畫面
windowrule = float on, pin on, match:class firefox, match:title Picture-in-Picture

# menu
windowrule {
    name            = menu
    match:class     = menu

    pin             = on
    float           = on
    no_anim         = on
    border_size     = 2
    # border_color    = $active-border-color
    size            = 1020 765
    opacity         = $opacity-alpha

}

windowrule {
    name = desktop portal gtk
    match:class = xdg-desktop-portal-gtk

    float = on
    opacity = $opacity-alpha
}

##### LAYER RULES #####
# Reference: https://wiki.hypr.land/Configuring/Window-Rules/#layer-rules
layerrule = blur on,        match:namespace waybar

layerrule {
    name            = wlogout
    match:namespace = logout_dialog

    blur            = on
    no_anim         = on
}

layerrule {
    name            = fuzzel
    match:namespace = fuzzel

    blur            = on
    dim_around      = on 
    # animation       = popin
    no_anim         = true
}

layerrule {
    name            = swaync-control-center
    match:namespace = swaync-control-center

    blur            = on
    ignore_alpha    = 0
}

layerrule {
    name = swaync-notification-window
    match:namespace = swaync-notification-window

    blur = on
    ignore_alpha = 0
}

##### WORKSPACE RULES #####
# Reference: https://wiki.hyprland.org/Configuring/Workspace-Rules/

#################
##### MISCS #####
#################
# Fix Chromium-based right-click-menu
windowrule = no_blur on, match:class ^()$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = MaximizeIgnore
    match:class = .*
    
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = XWaylandFix
    match:class         = ^$
    match:title         = ^$
    match:xwayland      = 1
    match:float         = 1
    match:fullscreen    = 0
    match:pin           = 0
    
    no_focus = on

}