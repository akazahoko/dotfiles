# Reference: https://wiki.hypr.land/Configuring/Keywords/
# Reference: https://wiki.hypr.land/Configuring/Binds/
# Reference: https://wiki.hypr.land/Configuring/Dispatchers/

# Mod Keys
$LMB                = mouse:272
$RMB                = mouse:273
$MMB                = mouse:274
$CapsLock           = code:66
$NumLock            = code:77

###################
##### WINDOWS #####
###################
# Change Windows Focus
bind = super, up,                   movefocus, u
bind = super, down,                 movefocus, d
bind = super, left,                 movefocus, l
bind = super, right,                movefocus, r

# Change Windows Focus (VIM-keys)
bind = super, k,                    movefocus, u
bind = super, j,                    movefocus, d
bind = super, h,                    movefocus, l
bind = super, l,                    movefocus, r

# Move Window
bind = shift super, up,             movewindow, u
bind = shift super, down,           movewindow, d   
bind = shift super, left,           movewindow, l
bind = shift super, right,          movewindow, r

# Move Window (VIM-Keys)
bind = shift super, k,              movewindow, u
bind = shift super, j,              movewindow, d   
bind = shift super, h,              movewindow, l
bind = shift super, l,              movewindow, r

# Move Window (Mouse)
bindm = super, $LMB, movewindow

# Resize Window Submap
bind = shift super, r, submap, resize
submap = resize

$RESIZE = 30
# Resize
binde = , up,                       resizeactive, 0         -$RESIZE
binde = , down,                     resizeactive, 0         $RESIZE
binde = , left,                     resizeactive, -$RESIZE  0
binde = , right,                    resizeactive, $RESIZE   0

# Resize (VIM-Keys)
binde = , k,                        resizeactive, 0         -$RESIZE
binde = , j,                        resizeactive, 0         $RESIZE
binde = , h,                        resizeactive, -$RESIZE  0
binde = , l,                        resizeactive, $RESIZE   0

bind = shift super, r, submap, reset
bind = , escape, submap, reset
submap = reset
# End of submap

# Resize (Mouse)
bindm = super, $RMB,                resizewindow

# Toggle Fullscreen / Float / Pin
bind = Super, f,                    fullscreen
bind = , f11,                       fullscreen
bind = Shift Super, f,              togglefloating
bind = Shift Super, t,              pin

######################
##### WORKSPACES #####
######################
# Switch Workspace
bind = super, 1,                    workspace, 1
bind = super, 2,                    workspace, 2
bind = super, 3,                    workspace, 3
bind = super, 4,                    workspace, 4
bind = super, 5,                    workspace, 5
bind = super, 6,                    workspace, 6
bind = super, 7,                    workspace, 7
bind = super, 8,                    workspace, 8
bind = super, 9,                    workspace, 9
bind = super, 0,                    workspace, 10
bind = super, grave,                workspace, previous

# Scroll through Workspaces
bind = super, mouse_up,             workspace, e+1
bind = super, mouse_down,           workspace, e-1

# Move Focused Window to Workspace
bind = shift super, 1,              movetoworkspace, 1 
bind = shift super, 2,              movetoworkspace, 2 
bind = shift super, 3,              movetoworkspace, 3 
bind = shift super, 4,              movetoworkspace, 4 
bind = shift super, 5,              movetoworkspace, 5 
bind = shift super, 6,              movetoworkspace, 6 
bind = shift super, 7,              movetoworkspace, 7 
bind = shift super, 8,              movetoworkspace, 8 
bind = shift super, 9,              movetoworkspace, 9 
bind = shift super, 0,              movetoworkspace, 10
bind = shift super, grave,          movetoworkspace, previous

# Move Focused Window to Workspace (Silent)
bind = ctrl shift super, 1,         movetoworkspacesilent, 1 
bind = ctrl shift super, 2,         movetoworkspacesilent, 2 
bind = ctrl shift super, 3,         movetoworkspacesilent, 3 
bind = ctrl shift super, 4,         movetoworkspacesilent, 4 
bind = ctrl shift super, 5,         movetoworkspacesilent, 5 
bind = ctrl shift super, 6,         movetoworkspacesilent, 6 
bind = ctrl shift super, 7,         movetoworkspacesilent, 7 
bind = ctrl shift super, 8,         movetoworkspacesilent, 8 
bind = ctrl shift super, 9,         movetoworkspacesilent, 9 
bind = ctrl shift super, 0,         movetoworkspacesilent, 10
bind = ctrl shift super, grave,     movetoworkspace, previous

###################
##### LAYOUTS #####
###################
# Split 
bind = shift super, r,              togglesplit

# Balance
bind = super, b,                    splitratio, exact 1 1

##############################
##### MULTIMEDIA CONTROL #####
##############################
# Volume Control (Sink)
bindel = ,XF86AudioRaiseVolume,                 exec, $SCRIPT_DIR/osd/volume.sh sink up 0.05
bindel = ,XF86AudioLowerVolume,                 exec, $SCRIPT_DIR/osd/volume.sh sink down 0.05
bindel = shift, XF86AudioRaiseVolume,           exec, $SCRIPT_DIR/osd/volume.sh sink up 0.01
bindel = shift, XF86AudioLowerVolume,           exec, $SCRIPT_DIR/osd/volume.sh sink down 0.01
bindel = ,XF86AudioMute,                        exec, $SCRIPT_DIR/osd/volume.sh sink mute

# Volume Control (Source)
bindel = ctrl, XF86AudioRaiseVolume,            exec, $SCRIPT_DIR/osd/volume.sh source up 0.05
bindel = ctrl, XF86AudioLowerVolume,            exec, $SCRIPT_DIR/osd/volume.sh source down 0.05
bindel = shift ctrl, XF86AudioRaiseVolume,      exec, $SCRIPT_DIR/osd/volume.sh source up 0.01
bindel = shift ctrl, XF86AudioLowerVolume,      exec, $SCRIPT_DIR/osd/volume.sh source down 0.01
bindel = ctrl, XF86AudioMute,                   exec, $SCRIPT_DIR/osd/volume.sh source mute

# Monitor Brightness Control (DDC/CI)
bindel = ,XF86MonBrightnessUp,                  exec, $SCRIPT_DIR/osd/brightness.sh up
bindel = ,XF86MonBrightnessDown,                exec, $SCRIPT_DIR/osd/brightness.sh down

# Playback Control (MPRIS)
bindl = ,XF86AudioNext,                         exec, $SCRIPT_DIR/mpris.sh next
bindl = ,XF86AudioPause,                        exec, $SCRIPT_DIR/mpris.sh play-pause
bindl = ,XF86AudioPlay,                         exec, $SCRIPT_DIR/mpris.sh play-pause
bindl = ,XF86AudioPrev,                         exec, $SCRIPT_DIR/mpris.sh previous

# Locks
# bind = ,$CapsLock,                              exec, $SCRIPT_DIR/osd/togglekey.sh capslock
bind = ,$NumLock,                               exec, $SCRIPT_DIR/osd/togglekey.sh numlock

# Reload
bind = super, F5,                               exec, $SCRIPT_DIR/reload.sh waybar

########################
##### APPLICATIONS #####
########################
$Launch         = Ctrl Alt Shift Super  # keyd maps caps lock to hyper (Overloading)
$LaunchMenu     = Super
$Toggle         = Super
$Power          = Ctrl Alt
$terminal       = foot
$btop           = $terminal --app-id=btop btop
$screenshot     = hyprshot -m region -o $(xdg-user-dir PICTURES)/Screenshots

bind = super, q,                killactive
bind = super, $MMB,             killactive
bind = shift super, q,          forcekillactive

bind = super, t, exec, $terminal
bind = super, e, exec, dolphin
bind = shift super, s, exec, $screenshot

# Dynamic Menu (dmenu)
bind = $LaunchMenu, space,      exec, $SCRIPT_DIR/dmenu/launcher.sh
bind = $LaunchMenu, r,          exec, $SCRIPT_DIR/dmenu/launcher.sh app
bind = $LaunchMenu, p,          exec, $SCRIPT_DIR/dmenu/launcher.sh pacman
bind = $LaunchMenu, v,          exec, $SCRIPT_DIR/dmenu/launcher.sh clipboard clipboard
bind = shift $LaunchMenu, v,    exec, $SCRIPT_DIR/dmenu/launcher.sh clipboard
bind = $LaunchMenu, tab,        exec, $SCRIPT_DIR/dmenu/switchwindow.sh
bind = $LaunchMenu, escape,     exec, $btop

# Applications
$nautilus       = nautilus
$dolphin        = dolphin
$firefox        = firefox
$colorpicker    = hyprpicker -a -f rgb
$vscode         = code
$note           = kwrite

bind = $Launch, f,          exec, $firefox
bind = $Launch, e,          exec, $dolphin
bind = $Launch, t,          exec, $terminal
bind = $Launch, d,          exec, $nautilus
bind = $Launch, s,          exec, $screenshot
bind = $Launch, p,          exec, $colorpicker
bind = $Launch, c,          exec, $vscode
bind = $Launch, n,          exec, $note  

# Toggle Services
$waybar         = killall -SIGUSR1 waybar
$idleinhibitor  = $SCRIPT_DIR/inhibitor.sh
$notification   = swaync-client -t

bind = $Toggle, w,          exec, $waybar
bind = $Toggle, n,          exec, $notification

# Power Options
# $wlogout        = pkill wlogout || wlogout -b 1
$suspend        = systemctl suspend
$shutdown       = systemctl shutdown

bind = $Power, Delete,      exec, $SCRIPT_DIR/dmenu/launcher.sh power
bind = $Power, l,           exec, $idleinhibitor
bindo = $Power, s,          exec, $suspend
bindo = $Power, backspace,  exec, $shutdown
