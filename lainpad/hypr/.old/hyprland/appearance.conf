# Reference: https://wiki.hypr.land/Configuring/Variables/

# Reference: https://wiki.hypr.land/Configuring/Variables/#general
general {
    border_size = 0

    gaps_in  = 5
    gaps_out = 10

    col.active_border   = $active-border-color
    col.inactive_border = $inactive-border-color

    # allow_tearing = true
    layout = dwindle
}

# Reference: https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding            = 0
    rounding_power      = 2

    active_opacity      = 1.0
    inactive_opacity    = 1.0

    blur {
        enabled         = true
        size            = 5
        passes          = 3
    }

    shadow {
        enabled         = true
        range           = 3
        render_power    = 1
        color           = $shadow-color
    }
}

# Reference: https://wiki.hypr.land/Configuring/Variables/#animations
# Reference: https://wiki.hypr.land/Configuring/Animations/#animation-tree
animations {
    # https://www.cssportal.com/css-cubic-bezier-generator/
    # https://easings.net/
    bezier = easeOutQuint,0.22, 1, 0.36, 1
    bezier = easeOutCubic,0.33, 1, 0.68, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo,0.16,1,0.3,1
    bezier = easeOutBack,0.34,1.18,0.64,1
    bezier = easeOutQuart, 0.25, 1, 0.5, 1
    
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = easeInOutQuint, 0.83, 0, 0.17, 1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    # Windows
    animation = windows,            1, 4.5, easeOutBack, popin

    # Layers
    # animation = layers,           1, 3.81,    easeOutQuint
    # animation = layersIn,         1, 4,       easeOutQuint,   fade
    # animation = layersOut,        1, 1.5,     linear,         fade
    
    # Fade
    animation = fade,               1, 7,       easeOutExpo
    # animation = fadeIn,           1, 8,       easeOutExpo
    # animation = fadeOut,          1, 1.46,    almostLinear
    # animation = fadeLayersIn,     1, 1.79,    almostLinear
    # animation = fadeLayersOut,    1, 1.39,    almostLinear
    
    # Border 
    animation = border, 1, 4, easeOutQuint

    # Workspace
    animation = workspaces, 1, 8, easeOutQuint, slide
    animation = specialWorkspace, 1, 8, easeOutQuint, fade
}